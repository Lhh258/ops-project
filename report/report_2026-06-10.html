<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>服务器巡检报告</title>
<style>
body { font-family: Arial, sans-serif; background-color:#f5f5f5; padding:20px; }
h1 { background:#2c3e50;color:white; padding:10px; }
table { border-collapse: collapse; width:300px; }
th, td { border: 1px solid #000; padding:10px; text-align:center; }
.status-ok { color:green; font-weight:bold; }
.status-warning { color:red; font-weight:bold; }
</style>
</head>
<body>
<h1>服务器巡检报告</h1>
<table>
<tr><th>巡检项目</th><th>状态</th></tr>
<tr><td>CPU</td><td class="status-ok">正常</td></tr>
<tr><td>内存</td><td class="status-ok">正常</td></tr>
<tr><td>磁盘</td><td class="status-ok">正常</td></tr>
<tr><td>Nginx</td><td class="status-ok">正常</td></tr>
</table>
</body>
</html>
